name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: HUSKY=0 bun install --frozen-lockfile

      - name: Biome
        run: bun run ci

      - name: TypeScript
        run: bun run tsc

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
